<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deep Work — Focus Timer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --glass-bg:     rgba(10, 10, 15, 0.38);
      --glass-border: rgba(255, 255, 255, 0.07);
      --accent:       rgba(255, 220, 155, 0.9);
      --accent-dim:   rgba(255, 220, 155, 0.4);
      --text:         rgba(255, 248, 235, 0.95);
      --text-dim:     rgba(255, 248, 235, 0.38);
      --blur:         blur(20px) saturate(180%);
      --mx: 50vw;
      --my: 50vh;
    }
    html, body {
      width: 100%; height: 100%; overflow: hidden;
      font-family: 'DM Mono', monospace;
      background: #09090e; color: var(--text);
      cursor: none;
    }

    /* ── CUSTOM CURSOR ── */
    #cursor-dot {
      position: fixed; width: 7px; height: 7px; border-radius: 50%;
      background: rgba(255, 220, 155, 0.7);
      transform: translate(-50%, -50%);
      left: var(--mx); top: var(--my);
      z-index: 9999; pointer-events: none;
      transition: transform 0.12s ease, background 0.18s ease;
      mix-blend-mode: screen;
    }
    #cursor-dot.hovering {
      transform: translate(-50%, -50%) scale(2.4);
      background: rgba(255, 220, 155, 1);
    }

    /* ── MOUSE GLOW ── */
    #glow {
      position: fixed; width: 560px; height: 560px;
      border-radius: 50%;
      background: radial-gradient(circle,
        rgba(255, 210, 115, 0.06) 0%,
        rgba(255, 185, 70, 0.03) 35%,
        transparent 70%);
      transform: translate(-50%, -50%);
      z-index: 3; pointer-events: none;
      will-change: left, top;
    }

    /* ── VIDEO ── */
    #bg-video {
      position: fixed; inset: 0; width: 100%; height: 100%;
      object-fit: cover; z-index: 0; opacity: 0;
      transition: opacity 1.3s ease;
    }
    #bg-video.loaded { opacity: 1; }
    #bg-iframe {
      position: fixed; top: -10%; left: -10%;
      width: 120%; height: 120%;
      border: none; z-index: 0; pointer-events: none; opacity: 0;
      transition: opacity 1.3s ease;
    }
    #bg-iframe.loaded { opacity: 1; }

    /* ── OVERLAYS ── */
    .vignette {
      position: fixed; inset: 0; z-index: 1; pointer-events: none;
      background: radial-gradient(ellipse at center,
        transparent 20%, rgba(0,0,0,0.42) 70%, rgba(0,0,0,0.72) 100%);
    }
    .vignette::after {
      content: ''; position: absolute; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      background-size: 200px; opacity: 0.18;
    }
    #fade-overlay {
      position: fixed; inset: 0; z-index: 8;
      background: #09090e; opacity: 0; pointer-events: none;
      transition: opacity 0.5s ease;
    }
    #fade-overlay.fading { opacity: 1; }

    /* ── LAYOUT ── */
    #app {
      position: fixed; inset: 0; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    /* ── CARD ── */
    .timer-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      backdrop-filter: var(--blur);
      -webkit-backdrop-filter: var(--blur);
      border-radius: 32px;
      padding: 48px 68px 42px;
      display: flex; flex-direction: column;
      align-items: center; gap: 8px;
      box-shadow: 0 32px 80px rgba(0,0,0,0.45), 0 0 0 1px rgba(255,255,255,0.04) inset;
      animation: rise 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    }
    @keyframes rise {
      from { opacity: 0; transform: translateY(26px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }
    .session-label {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px; font-weight: 400;
      letter-spacing: 0.35em; text-transform: uppercase;
      color: var(--accent-dim); margin-bottom: 4px;
    }

    /* ── TIMER DISPLAY (static) ── */
    #timer-display {
      font-family: 'DM Mono', monospace;
      font-size: clamp(66px, 13vw, 108px);
      font-weight: 300; letter-spacing: -0.02em; line-height: 1;
      color: var(--text);
      text-shadow: 0 0 60px rgba(255,220,160,0.18);
      cursor: text; user-select: none;
      transition: color 0.5s, text-shadow 0.5s, opacity 0.18s;
    }
    #timer-display:hover { opacity: 0.82; }
    #timer-display.urgent {
      color: rgba(255,160,110,0.95);
      text-shadow: 0 0 60px rgba(255,130,80,0.3);
    }
    #timer-display.editing { display: none; }

    /* ── EDIT HINT ── */
    #edit-hint {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px; font-weight: 300; font-style: italic;
      letter-spacing: 0.18em; color: var(--text-dim);
      opacity: 0; transform: translateY(-3px);
      transition: opacity 0.3s, transform 0.3s;
      pointer-events: none; min-height: 18px; margin-top: -4px;
    }
    #edit-hint.visible { opacity: 1; transform: translateY(0); }

    /* ── TIMER EDITOR (ghost inputs) ── */
    #timer-editor {
      display: none; align-items: center; gap: 0;
      font-family: 'DM Mono', monospace;
      font-size: clamp(66px, 13vw, 108px);
      font-weight: 300; letter-spacing: -0.02em; line-height: 1;
      color: var(--text);
      animation: edIn 0.22s cubic-bezier(0.22,1,0.36,1) both;
    }
    #timer-editor.active { display: flex; }
    @keyframes edIn {
      from { opacity: 0; transform: scale(0.97); }
      to   { opacity: 1; transform: scale(1); }
    }
    .t-seg {
      background: transparent; border: none; outline: none;
      font-family: inherit; font-size: inherit; font-weight: inherit;
      letter-spacing: inherit; color: var(--text);
      text-align: center; width: 2.1ch; padding: 0;
      border-bottom: 1.5px solid transparent;
      transition: border-color 0.2s, color 0.2s;
      caret-color: var(--accent);
    }
    .t-seg:focus { border-bottom-color: rgba(255,220,155,0.5); color: var(--accent); }
    .t-seg::-webkit-inner-spin-button,
    .t-seg::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    .t-seg[type=number] { -moz-appearance: textfield; }
    .t-colon {
      opacity: 0.3; padding: 0 3px;
      pointer-events: none; user-select: none;
      line-height: 1; margin-bottom: 0.04em;
    }

    /* ── PROGRESS BAR ── */
    .progress-bar-wrap {
      width: 100%; height: 2px;
      background: rgba(255,255,255,0.07);
      border-radius: 99px; margin: 18px 0 8px; overflow: hidden;
    }
    #progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent-dim), var(--accent));
      border-radius: 99px; width: 100%;
      transition: width 1s linear;
    }

    /* ── CONTROLS ── */
    .controls { display: flex; gap: 12px; margin-top: 12px; }
    .btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px; font-weight: 500;
      letter-spacing: 0.18em; text-transform: uppercase;
      padding: 12px 28px; border-radius: 99px;
      border: 1px solid var(--glass-border);
      background: rgba(255,255,255,0.06);
      color: var(--text-dim); cursor: pointer;
      transition: all 0.25s ease;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .btn:hover {
      background: rgba(255,255,255,0.12); color: var(--text);
      border-color: rgba(255,255,255,0.14); transform: translateY(-1px);
    }
    .btn:active { transform: translateY(0); }
    .btn.primary {
      background: rgba(255,220,155,0.1);
      border-color: rgba(255,220,155,0.25);
      color: var(--accent);
    }
    .btn.primary:hover {
      background: rgba(255,220,155,0.18);
      border-color: rgba(255,220,155,0.4);
      box-shadow: 0 0 28px rgba(255,220,155,0.1);
    }

    /* Apply button (edit mode only) */
    #apply-btn {
      display: none;
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px; font-weight: 300; font-style: italic;
      letter-spacing: 0.22em; text-transform: uppercase;
      padding: 8px 22px; border-radius: 99px;
      border: 1px solid rgba(255,220,155,0.22);
      background: rgba(255,220,155,0.07);
      color: var(--accent-dim); cursor: pointer;
      transition: all 0.22s ease; margin-top: 4px;
    }
    #apply-btn:hover {
      background: rgba(255,220,155,0.14);
      border-color: rgba(255,220,155,0.38);
      color: var(--accent);
    }
    #apply-btn.visible { display: block; }

    /* ── SESSION DOTS ── */
    .session-dots { display: flex; gap: 6px; margin-top: 20px; }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,0.12);
      transition: background 0.4s ease, transform 0.3s ease;
    }
    .dot.done { background: var(--accent-dim); transform: scale(1.2); }

    /* ── TOP BAR ── */
    #top-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 15;
      display: flex; justify-content: space-between; align-items: center;
      padding: 24px 32px;
    }
    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px; font-weight: 300;
      letter-spacing: 0.4em; text-transform: uppercase;
      color: rgba(255,255,255,0.18);
    }
    #scene-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 12px; font-weight: 300; font-style: italic;
      letter-spacing: 0.2em; color: rgba(255,255,255,0.2);
    }

    /* ── SCENE SWITCHER ── */
    #scene-btn {
      position: fixed; bottom: 28px; right: 28px; z-index: 20;
      font-family: 'Cormorant Garamond', serif;
      font-size: 12px; font-weight: 400;
      letter-spacing: 0.2em; text-transform: uppercase;
      padding: 10px 20px; border-radius: 99px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg); color: var(--text-dim);
      cursor: pointer;
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      transition: all 0.3s ease;
      display: flex; align-items: center; gap: 8px;
    }
    #scene-btn:hover { background: rgba(10,10,15,0.55); color: var(--text); border-color: rgba(255,255,255,0.14); }
    #scene-btn .scene-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--accent-dim); }
    #scene-panel {
      position: fixed; bottom: 72px; right: 28px; z-index: 20;
      background: var(--glass-bg); border: 1px solid var(--glass-border);
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      border-radius: 20px; padding: 8px;
      display: flex; flex-direction: column; gap: 4px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.5);
      opacity: 0; pointer-events: none;
      transform: translateY(8px) scale(0.97);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }
    #scene-panel.open { opacity: 1; pointer-events: all; transform: none; }
    .scene-option {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px; font-weight: 400; letter-spacing: 0.12em;
      padding: 10px 18px; border-radius: 12px; cursor: pointer;
      color: var(--text-dim); transition: all 0.2s ease;
      white-space: nowrap; display: flex; align-items: center; gap: 10px;
      background: none; border: none;
    }
    .scene-option:hover, .scene-option.active { background: rgba(255,255,255,0.07); color: var(--text); }
    .scene-option .icon { font-size: 16px; }

    /* ── KBD HINT ── */
    #kbd-hint {
      position: fixed; bottom: 28px; left: 32px; z-index: 15;
      font-family: 'DM Mono', monospace;
      font-size: 9px; font-weight: 300;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--text-dim); opacity: 0.38; line-height: 2;
      pointer-events: none;
    }

    /* ── TOAST ── */
    #toast {
      position: fixed; top: 28px; left: 50%; z-index: 30;
      transform: translateX(-50%) translateY(-130%);
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px; font-weight: 300; font-style: italic;
      letter-spacing: 0.25em; padding: 12px 28px; border-radius: 99px;
      border: 1px solid var(--glass-border);
      background: var(--glass-bg);
      backdrop-filter: var(--blur); -webkit-backdrop-filter: var(--blur);
      color: var(--accent-dim); white-space: nowrap;
      transition: transform 0.5s cubic-bezier(0.22,1,0.36,1), opacity 0.4s;
      opacity: 0;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }
  </style>
</head>
<body>

<video id="bg-video" autoplay muted loop playsinline></video>
<iframe id="bg-iframe" allow="autoplay; encrypted-media" allowfullscreen></iframe>
<div class="vignette"></div>
<div id="fade-overlay"></div>

<!-- Glow layer: z-index 3, above overlay (1), below UI (10) -->
<div id="glow"></div>
<!-- Custom cursor dot -->
<div id="cursor-dot"></div>

<div id="top-bar">
  <div class="wordmark">Deep Work</div>
  <div id="scene-name">Rainy Night</div>
</div>

<div id="app">
  <div class="timer-card">
    <div class="session-label" id="mode-label">Focus Session</div>

    <!-- Static display -->
    <div id="timer-display">25:00</div>

    <!-- Ghost-input editor -->
    <div id="timer-editor">
      <input class="t-seg" id="seg-h" type="number" min="0" max="99" placeholder="00" />
      <span class="t-colon">:</span>
      <input class="t-seg" id="seg-m" type="number" min="0" max="59" placeholder="00" />
      <span class="t-colon">:</span>
      <input class="t-seg" id="seg-s" type="number" min="0" max="59" placeholder="00" />
    </div>

    <div id="edit-hint">click timer to edit</div>

    <div class="progress-bar-wrap">
      <div id="progress-fill"></div>
    </div>

    <div class="controls">
      <button class="btn" id="reset-btn">Reset</button>
      <button class="btn primary" id="start-btn">Start</button>
    </div>

    <button id="apply-btn">apply &nbsp;↵</button>

    <div class="session-dots" id="session-dots">
      <div class="dot"></div><div class="dot"></div>
      <div class="dot"></div><div class="dot"></div>
    </div>
  </div>
</div>

<button id="scene-btn">
  <span class="scene-dot"></span>
  <span id="scene-btn-label">Scene</span>
</button>
<div id="scene-panel">
  <button class="scene-option active" data-scene="0"><span class="icon">🌧</span> Rainy Night</button>
  <button class="scene-option"         data-scene="1"><span class="icon">☕</span> Cozy Cafe</button>
  <button class="scene-option"         data-scene="2"><span class="icon">🌿</span> Forest Stream</button>
</div>

<div id="kbd-hint">Space · Start/Pause &nbsp;·&nbsp; R · Reset &nbsp;·&nbsp; E · Edit Time &nbsp;·&nbsp; S · Scene</div>
<div id="toast"></div>

<script>
/* ── SCENES ── */
const SCENES = [
  { name: "Rainy Night",   type: "youtube", id: "4xDzrJKXOOY" },
  { name: "Cozy Cafe",     type: "youtube", id: "jfKfPfyJRdk" },
  { name: "Forest Stream", type: "youtube", id: "xNN7iTA57jM" },
];

/* ── MOUSE GLOW + CURSOR ── */
const rootEl    = document.documentElement;
const glowEl    = document.getElementById('glow');
const cursorDot = document.getElementById('cursor-dot');
let mX = window.innerWidth / 2, mY = window.innerHeight / 2;
let gX = mX, gY = mY;

document.addEventListener('mousemove', e => {
  mX = e.clientX; mY = e.clientY;
  rootEl.style.setProperty('--mx', mX + 'px');
  rootEl.style.setProperty('--my', mY + 'px');
});

// Smoothed glow with gentle lag — "warm lamp" feel
(function glowLoop() {
  gX += (mX - gX) * 0.07;
  gY += (mY - gY) * 0.07;
  glowEl.style.left = gX + 'px';
  glowEl.style.top  = gY + 'px';
  requestAnimationFrame(glowLoop);
})();

// Cursor scale on hover
document.addEventListener('mouseover', e => {
  if (e.target.matches('button,.btn,a,input,[role="button"],#timer-display')) {
    cursorDot.classList.add('hovering');
  }
});
document.addEventListener('mouseout', e => {
  if (e.target.matches('button,.btn,a,input,[role="button"],#timer-display')) {
    cursorDot.classList.remove('hovering');
  }
});

/* ── TIMER STATE ── */
const DEFAULT_SECS = 25 * 60;
const BREAK_SECS   = 5  * 60;
let totalSecs = DEFAULT_SECS, remaining = DEFAULT_SECS;
let running = false, ticker = null;
let sessionsCompleted = 0, isBreak = false, editMode = false;

/* ── DOM REFS ── */
const timerDisplay = document.getElementById('timer-display');
const timerEditor  = document.getElementById('timer-editor');
const segH = document.getElementById('seg-h');
const segM = document.getElementById('seg-m');
const segS = document.getElementById('seg-s');
const editHint  = document.getElementById('edit-hint');
const applyBtn  = document.getElementById('apply-btn');
const startBtn  = document.getElementById('start-btn');
const resetBtn  = document.getElementById('reset-btn');
const progFill  = document.getElementById('progress-fill');
const allDots   = document.querySelectorAll('.dot');
const modeLabel = document.getElementById('mode-label');
const toast     = document.getElementById('toast');

/* ── RENDER ── */
function pad(n) { return String(n).padStart(2,'0'); }
function toHMS(s) { return { h:Math.floor(s/3600), m:Math.floor((s%3600)/60), s:s%60 }; }
function render() {
  const {h,m,s} = toHMS(remaining);
  timerDisplay.textContent = h > 0
    ? `${pad(h)}:${pad(m)}:${pad(s)}`
    : `${pad(m)}:${pad(s)}`;
  progFill.style.width = (remaining / totalSecs * 100) + '%';
  timerDisplay.classList.toggle('urgent', remaining <= 60 && !isBreak);
  document.title = timerDisplay.textContent + ' — Deep Work';
}

/* ── TICK ── */
function tick() {
  if (remaining <= 0) {
    clearInterval(ticker); running = false; startBtn.textContent = 'Start';
    playChime();
    if (!isBreak) {
      sessionsCompleted = Math.min(sessionsCompleted + 1, 4);
      allDots.forEach((d,i) => d.classList.toggle('done', i < sessionsCompleted));
      showToast(sessionsCompleted === 4 ? 'Four sessions · take a long break 🌿' : 'Session complete ✦');
      if (sessionsCompleted === 4) setTimeout(() => { sessionsCompleted = 0; allDots.forEach(d => d.classList.remove('done')); }, 3200);
    } else {
      showToast('Break over — back to work ✦');
    }
    isBreak = !isBreak;
    totalSecs = isBreak ? BREAK_SECS : DEFAULT_SECS;
    remaining = totalSecs;
    modeLabel.textContent = isBreak ? 'Short Break' : 'Focus Session';
    render(); return;
  }
  remaining--; render();
}

/* ── CONTROLS ── */
function toggleTimer() {
  if (editMode) commitEdit();
  if (running) {
    clearInterval(ticker); running = false; startBtn.textContent = 'Resume';
  } else {
    ticker = setInterval(tick, 1000); running = true; startBtn.textContent = 'Pause';
    editHint.classList.remove('visible');
  }
}
function resetTimer() {
  if (editMode) exitEdit(false);
  clearInterval(ticker); running = false; isBreak = false;
  totalSecs = DEFAULT_SECS; remaining = DEFAULT_SECS;
  modeLabel.textContent = 'Focus Session'; startBtn.textContent = 'Start';
  render();
}
startBtn.addEventListener('click', toggleTimer);
resetBtn.addEventListener('click', resetTimer);

/* ── EDIT MODE ── */
function enterEditMode() {
  if (running) return;
  editMode = true;
  const {h,m,s} = toHMS(remaining);
  segH.value = h   ? pad(h) : '';
  segM.value = m   ? pad(m) : '';
  segS.value = s   ? pad(s) : '';
  timerDisplay.classList.add('editing');
  timerEditor.classList.add('active');
  applyBtn.classList.add('visible');
  editHint.classList.remove('visible');
  (h ? segH : segM).focus();
  (h ? segH : segM).select();
}
function exitEdit(commit) {
  editMode = false;
  timerDisplay.classList.remove('editing');
  timerEditor.classList.remove('active');
  applyBtn.classList.remove('visible');
}
function commitEdit() {
  let h = parseInt(segH.value) || 0;
  let m = parseInt(segM.value) || 0;
  let s = parseInt(segS.value) || 0;
  h = Math.max(0, Math.min(99, h));
  s = Math.max(0, Math.min(59, s));
  m = Math.max(0, m); // allow overflow; we normalise below
  const raw = h * 3600 + m * 60 + s;
  const clamped = Math.max(1, Math.min(99*3600+59*60+59, raw));
  totalSecs = clamped; remaining = clamped;
  exitEdit(); render();
}

// Show edit hint when paused + hovering
timerDisplay.addEventListener('mouseenter', () => { if (!running && !editMode) editHint.classList.add('visible'); });
timerDisplay.addEventListener('mouseleave', () => { if (!editMode) editHint.classList.remove('visible'); });
timerDisplay.addEventListener('click', enterEditMode);
applyBtn.addEventListener('click', commitEdit);
timerEditor.addEventListener('keydown', e => {
  if (e.key === 'Enter')  { e.preventDefault(); commitEdit(); }
  if (e.key === 'Escape') { exitEdit(false); render(); }
});
// Auto-advance on 2-digit input
function autoAdv(cur, nxt) {
  cur.addEventListener('input', () => {
    let v = cur.value.replace(/\D/g,'');
    if (v.length > 2) v = v.slice(-2);
    cur.value = v;
    if (v.length === 2 && nxt) { nxt.focus(); nxt.select(); }
  });
}
autoAdv(segH, segM); autoAdv(segM, segS); autoAdv(segS, null);
// Click outside → commit
document.addEventListener('mousedown', e => {
  if (editMode && !timerEditor.contains(e.target) && e.target !== applyBtn) commitEdit();
});

/* ── CHIME ── */
function playChime() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    [523.25, 659.25, 783.99, 1046.50].forEach((freq, i) => {
      const osc = ctx.createOscillator(), gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = 'sine'; osc.frequency.value = freq;
      const t = ctx.currentTime + i * 0.28;
      gain.gain.setValueAtTime(0, t);
      gain.gain.linearRampToValueAtTime(0.16, t + 0.055);
      gain.gain.exponentialRampToValueAtTime(0.0001, t + 1.35);
      osc.start(t); osc.stop(t + 1.5);
    });
  } catch(e) {}
}

/* ── TOAST ── */
let toastTmr;
function showToast(msg) {
  toast.textContent = msg; toast.classList.add('show');
  clearTimeout(toastTmr);
  toastTmr = setTimeout(() => toast.classList.remove('show'), 3600);
}

/* ── SCENE SWITCHER ── */
let currentScene  = 0;
const scenePanel  = document.getElementById('scene-panel');
const sceneBtn    = document.getElementById('scene-btn');
const sceneNameEl = document.getElementById('scene-name');
const sceneBtnLbl = document.getElementById('scene-btn-label');
const bgVideo     = document.getElementById('bg-video');
const bgIframe    = document.getElementById('bg-iframe');
const fadeOverlay = document.getElementById('fade-overlay');

function loadScene(idx, instant) {
  const s = SCENES[idx];
  if (!instant) fadeOverlay.classList.add('fading');
  setTimeout(() => {
    bgVideo.classList.remove('loaded');
    bgIframe.classList.remove('loaded');
    if (s.type === 'video') {
      bgIframe.src = 'about:blank'; bgVideo.src = s.id; bgVideo.load();
      bgVideo.oncanplay = () => { bgVideo.classList.add('loaded'); fadeOverlay.classList.remove('fading'); };
    } else {
      bgVideo.src = '';
      bgIframe.src = `https://www.youtube-nocookie.com/embed/${s.id}?autoplay=1&mute=1&loop=1&playlist=${s.id}&controls=0&showinfo=0&rel=0&iv_load_policy=3&modestbranding=1`;
      bgIframe.onload = () => { bgIframe.classList.add('loaded'); if (!instant) fadeOverlay.classList.remove('fading'); };
      if (instant) setTimeout(() => fadeOverlay.classList.remove('fading'), 100);
    }
    sceneNameEl.textContent = s.name; sceneBtnLbl.textContent = s.name;
    document.querySelectorAll('.scene-option').forEach((el, i) => el.classList.toggle('active', i === idx));
  }, instant ? 0 : 550);
}

sceneBtn.addEventListener('click', e => { e.stopPropagation(); scenePanel.classList.toggle('open'); });
document.querySelectorAll('.scene-option').forEach(el => {
  el.addEventListener('click', () => {
    currentScene = parseInt(el.dataset.scene);
    loadScene(currentScene, false);
    scenePanel.classList.remove('open');
  });
});
document.addEventListener('click', e => {
  if (!scenePanel.contains(e.target) && e.target !== sceneBtn && !sceneBtn.contains(e.target))
    scenePanel.classList.remove('open');
});

/* ── KEYBOARD SHORTCUTS ── */
document.addEventListener('keydown', e => {
  if (editMode && e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); toggleTimer(); }
  if (e.code === 'KeyR')  { resetTimer(); }
  if (e.code === 'KeyS')  { scenePanel.classList.toggle('open'); }
  if (e.code === 'KeyE' && !running) enterEditMode();
});

/* ── BOOT ── */
render();
loadScene(0, true);
</script>
